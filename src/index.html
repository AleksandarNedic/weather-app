<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
</head>
<body id="body">
<div class="weather-app">
    <section class="weather-app-search">
        <form id="form">
            <input
                    id="input"
                    type="text"
                    placeholder="Enter city name"
            >
            <button id="submit" type="submit">
                Search
            </button>
        </form>
    </section>
    <div class="left-panel">
        <div id="weather"></div>
        <div id="day30-container">
            <button id="show-30-days" type="button">
                30 Days
            </button>
        </div>

    </div>
    <div id="forecast"></div>
</div>
<script src="bundle.js"></script>
</body>

</html>
